<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Mang Jose Food Order Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    html,
    body {
    touch-action: manipulation;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6f8;
    }

    .calculator {
      width: 380px;
      background: #ffffff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    button {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

    h1 {
      margin: 0 0 16px;
      text-align: center;
      font-size: 24px;
    }

    .display {
      background: #111827;
      color: white;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 16px;
      text-align: right;
    }

    .display small {
      display: block;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .total {
      font-size: 32px;
      font-weight: bold;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.15s;
    }

    .item-btn {
      background: #2563eb;
      color: white;
    }

    .item-btn-bbq { background: #8B4513; color: white; }
.item-btn-tenga { background: #ff6a00; color: white; }
.item-btn-isawbaboy { background: #be4f00; color: white; }
.item-btn-isawmanok { background: #bf7a49; color: white; }
.item-btn-ulomanok { background: #643e23; color: white; }
.item-btn-balatbaboy { background: #b15c20; color: white; }
.item-btn-dugo { background: #000000; color: white; }
.item-btn-hotdog { background: #DC2626; color: white; }
.item-btn-rice { background: #b4b4b4; color: black;}

    .item-btn:hover {
      background: #1d4ed8;
    }

    .clear-btn {
      width: 100%;
      background: #ef4444;
      color: white;
      margin-bottom: 16px;
    }

    .clear-btn:hover {
      background: #dc2626;
    }

    .order-list {
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
    }

    .order-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f1f1f1;
      font-size: 15px;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 12px 0;
    }

    .item-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-radius: 12px;
  overflow: hidden;
  min-height: 70px;
}

.item-content {
  flex: 1;
  text-align: center;
  font-size: 15px;
  font-weight: bold;
  color: inherit;
}

.arrow-btn {
  width: 45px;
  height: 70px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: inherit;
  font-size: 24px;
  cursor: pointer;
  transition: 0.2s;
}

.arrow-btn:hover {
  background: rgba(255,255,255,0.35);
}

.item-btn-rice {
  color: black;
}

.item-btn-rice .arrow-btn {
  color: black;
}


.display {
  color: white;
  padding: 18px;
  border-radius: 12px;
  margin-bottom: 16px;
  text-align: right;
}

.display small {
  display: block;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 6px;
}

.total-display {
  background: #111827; /* Dark Gray */
}

.payment-display {
  background: #2563eb; /* Blue */
}

.change-display {
  background: #16a34a; /* Green */
}

.total {
  font-size: 32px;
  font-weight: bold;
}

.payment-buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.payment-buttons button {
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  background: #2563eb;
  color: white;
  transition: 0.15s;
}

.payment-buttons button:hover {
  background: #1d4ed8;
}

.reset-payment {
  grid-column: span 2;
  background: #ef4444 !important;
}

.reset-payment:hover {
  background: #dc2626 !important;
}


.payment-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.payment-row .display {
  flex: 1;
  margin-bottom: 0;
}

.payment-display {
  background: #2563eb;
}

.change-display {
  background: #16a34a;
}

.payment-row .total {
  font-size: 24px; /* Slightly smaller so both fit nicely */
}

.payment-btn {
  width: 100%;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

.payment-btn:hover {
  background: #15803d;
}

#paymentSection {
  margin-top: 20px;
}

.payment-toggle-btn {
  width: 100%;
  background: transparent;
  border: none;
  color: #6b7280;
  font-size: 14px;
  font-weight: 500;
  padding: 8px;
  cursor: pointer;
  transition: color 0.2s;
}

.payment-toggle-btn:hover {
  color: #374151;
}

.payment-toggle-btn {
  width: 100%;
  background:#3a3a3a;
  border: none;
  border-top: 1px solid #e5e7eb;
  border-bottom: 1px solid #e5e7eb;
  color: #ffffff;
  font-size: 14px;
  font-weight: 500;
  padding: 10px 0;
  margin: 16px 0;
  cursor: pointer;
  transition: all 0.2s ease;
}

.payment-toggle-btn:hover {
  background: #9b9b9b;
  color: #374151;
}

.payment-toggle-btn:active {
  background: #f3f4f6;
}
  </style>
</head>
<body>
  <div class="calculator">
    <h1>Jose Ihaw-Ihaw Calculator</h1>

<div class="display total-display">
  <small>Total Price</small>
  <div class="total" id="totalPrice">₱0.00</div>
</div>


    <div class="order-list" id="orderList">
      <div class="empty">No items selected</div>
    </div>

<div class="buttons">
  <div class="item-card item-btn-bbq">
    <button class="arrow-btn" onclick="changeQty('BBQ', -1)">◀</button>
    <div class="item-content">
      BBQ<br>₱25
    </div>
    <button class="arrow-btn" onclick="changeQty('BBQ', 1)">▶</button>
  </div>

  <div class="item-card item-btn-tenga">
    <button class="arrow-btn" onclick="changeQty('TENGA', -1)">◀</button>
    <div class="item-content">
      TENGA<br>₱25
    </div>
    <button class="arrow-btn" onclick="changeQty('TENGA', 1)">▶</button>
  </div>

  <div class="item-card item-btn-isawbaboy">
    <button class="arrow-btn" onclick="changeQty('ISAW BABOY', -1)">◀</button>
    <div class="item-content">
      ISAW BABOY<br>₱15
    </div>
    <button class="arrow-btn" onclick="changeQty('ISAW BABOY', 1)">▶</button>
  </div>

  <div class="item-card item-btn-isawmanok">
    <button class="arrow-btn" onclick="changeQty('ISAW MANOK', -1)">◀</button>
    <div class="item-content">
      ISAW MANOK<br>₱10
    </div>
    <button class="arrow-btn" onclick="changeQty('ISAW MANOK', 1)">▶</button>
  </div>

  <div class="item-card item-btn-balatbaboy">
    <button class="arrow-btn" onclick="changeQty('BALAT', -1)">◀</button>
    <div class="item-content">
      BALAT BABOY<br>₱10
    </div>
    <button class="arrow-btn" onclick="changeQty('BALAT', 1)">▶</button>
  </div>

  <div class="item-card item-btn-ulomanok">
    <button class="arrow-btn" onclick="changeQty('ULO MANOK', -1)">◀</button>
    <div class="item-content">
      ULO MANOK<br>₱15
    </div>
    <button class="arrow-btn" onclick="changeQty('ULO MANOK', 1)">▶</button>
  </div>

  <div class="item-card item-btn-dugo">
    <button class="arrow-btn" onclick="changeQty('DUGO', -1)">◀</button>
    <div class="item-content">
      DUGO<br>₱10
    </div>
    <button class="arrow-btn" onclick="changeQty('DUGO', 1)">▶</button>
  </div>

  <div class="item-card item-btn-hotdog">
    <button class="arrow-btn" onclick="changeQty('HOTDOG', -1)">◀</button>
    <div class="item-content">
      HOTDOG<br>₱20
    </div>
    <button class="arrow-btn" onclick="changeQty('HOTDOG', 1)">▶</button>
  </div>

  <div class="item-card item-btn-rice">
    <button class="arrow-btn" onclick="changeQty('RICE', -1)">◀</button>
    <div class="item-content">
      RICE<br>₱12
    </div>
    <button class="arrow-btn" onclick="changeQty('RICE', 1)">▶</button>
  </div>
</div>

<div>
<button class="clear-btn" onclick="clearOrder()">Clear Order</button>
<button id="paymentToggle" class="payment-toggle-btn" onclick="togglePayment()">
  ▼ Payment
</button>
</div>


      <div id="paymentSection" style="display: none;">
<div class="payment-row">
  <div class="display payment-display">
    <small>Payment</small>
    <div class="total" id="paymentAmount">₱0.00</div>
  </div>

  <div class="display change-display">
    <small>Change</small> 
    <div class="total" id="changeAmount">₱0.00</div>
  </div>
</div>

<div class="payment-buttons">
      <button onclick="addPayment(1)">+₱1</button>
         <button onclick="addPayment(5)">+₱5</button>
  <button onclick="addPayment(10)">+₱10</button>
  <button onclick="addPayment(20)">+₱20</button>
  <button onclick="addPayment(50)">+₱50</button>

  <button onclick="addPayment(100)">+₱100</button>
  <button onclick="addPayment(200)">+₱200</button>
  <button onclick="addPayment(500)">+₱500</button>

  <button onclick="addPayment(1000)">+₱1000</button>

</div> 

<button onclick="clearPayment()" class="clear-btn">Reset Payment</button>

</div>

  </div>

  <script>
    const menu = {
      BBQ: 25,
      TENGA: 25,
      'ISAW BABOY': 15,
      DUGO: 10,
      'ISAW MANOK': 10,
      BALAT: 10,
      HOTDOG: 20,
      'ULO MANOK': 15,
      RICE: 12
    };  

    const order = {};
    let payment = 0;

 function changeQty(itemName, delta) {
  order[itemName] = (order[itemName] || 0) + delta;

  if (order[itemName] <= 0) {
    delete order[itemName];
  }

  updateDisplay();
}

    function updateDisplay() {
  const orderList = document.getElementById('orderList');
  const totalPrice = document.getElementById('totalPrice');

  orderList.innerHTML = '';
  let grandTotal = 0;

  const itemOrder = [
    "BBQ",
    "TENGA",
    "ISAW BABOY",
    "ISAW MANOK",
    "ULO MANOK",
    "BALAT",
    "DUGO",
    "HOTDOG",
    "RICE"
  ];

  itemOrder.forEach(itemName => {
    const quantity = order[itemName] || 0;

    if (quantity === 0) return;

    const price = menu[itemName];
    const lineTotal = quantity * price;
    grandTotal += lineTotal;

    const row = document.createElement('div');
    row.className = 'order-row';

    row.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
        <div>
          <span>${itemName}</span>
          <span style="
            margin-left:8px;
            padding:2px 8px;
            background:#ff9800;
            color:white;
            border-radius:12px;
            font-weight:bold;
            font-size:1.1em;
          ">
            ×${quantity}
          </span>
        </div>
        <strong style="font-size:1.1em;">
          ₱${lineTotal.toFixed(2)}
        </strong>
      </div>
    `;

    orderList.appendChild(row);
  });

  if (grandTotal === 0) {
    orderList.innerHTML = '<div class="empty">No items selected</div>';
  }

  totalPrice.textContent = `₱${grandTotal.toFixed(2)}`;

  document.getElementById("paymentAmount").textContent =
  `₱${payment.toFixed(2)}`;

const change = payment - grandTotal;

document.getElementById("changeAmount").textContent =
  `₱${change.toFixed(2)}`;
}
    function clearOrder() {
      Object.keys(order).forEach(itemName => delete order[itemName]);
      updateDisplay();
    }
    function addPayment(amount) {
  payment += amount;
  updateDisplay();
}

function clearPayment() {
  payment = 0;
  updateDisplay();
}

function clearAll(){
    clearPayment();
    clearOrder();
}

function togglePayment() {
  const paymentSection = document.getElementById("paymentSection");
  const button = document.getElementById("paymentToggle");

  const isHidden = paymentSection.style.display === "none";

  paymentSection.style.display = isHidden ? "block" : "none";
  button.innerHTML = isHidden ? "▲ Payment" : "▼ Payment";
}
  </script>
</body>
</html>
